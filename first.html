<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign up form</title>
  <link rel="stylesheet" href="surya.css">
</head>
<body>
  <div class="login">
   <form>
     <h1>Sign up</h1>
     <p>Create an account or <a href="" target="_blank">sign in</a></p>
     
     <div class="address">
      <label for="email" style="display: block;">Email address</label>
      <input type="email" placeholder="" id="email" style="display: block;">
     </div>

     <br>
     <div class="username">
      <label for="name" style="display: block;">Username</label>
      <input type="text" style="display: block;" id="name">
     </div>
     <br>

     <div class="password">
      <label for="password" style="display: block;">Password</label>
      <input type="password" style="display:block;" id="password">
     </div>
      
     <br>


    <div class="term">
    <input type="checkbox" id="term">
    <label for="term">I do not want receive emails with adversting news suggestions or marketing promotions.</label>
    </div>


     <button style="display: block; background-color: blueviolet; height: 40px;  width:100px; font-size: 20px; font-weight: 700; cursor: pointer; margin-left: 100px; margin-top: 40px;">Sign-up</button>

      
   </form>
  </div>
</body>
</html>
